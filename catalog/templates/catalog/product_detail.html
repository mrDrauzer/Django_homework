{% extends 'base.html' %}
{% block content %}
  <h1>{{ product.name }}</h1>
  {% if product.image %}
    <img src="{{ product.image.url }}" alt="{{ product.name }}">
  {% endif %}
  <p>{{ product.description }}</p>
  <p>Цена: {{ product.price }}</p>
  <p>Категория: {{ product.category.name }}</p>
  <a href="{% url 'catalog:home' %}">Назад на главную</a>
{% endblock %}
