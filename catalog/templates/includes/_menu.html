<nav>
    <a href="{% url 'catalog:home' %}">Главная</a>
    <a href="{% url 'blog:blogpost_list' %}">Блог</a>
    <a href="{% url 'catalog:contacts' %}">Контакты</a>

    {% if user.is_authenticated %}
        <span style="color: #fff; margin: 0 15px;">Привет, {{ user.email }}!</span>
        <a href="{% url 'catalog:product_add' %}" style="background: #28a745;">➕ Добавить товар</a>
        <form action="{% url 'accounts:logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" style="background: #dc3545; color: #fff; border:none; padding:8px 18px; cursor:pointer; margin-left: 10px;">
                Выход
            </button>
        </form>
    {% else %}
        <a href="{% url 'accounts:login' %}" style="background: #0d6efd;">Вход</a>
        <a href="{% url 'accounts:register' %}" style="background: #28a745;">Регистрация</a>
    {% endif %}
</nav>
